name: Deploy docs to Codeberg Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4

      - name: Install Python and git
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends python3 python3-pip git ca-certificates

      - name: Install zensical
        run: pip3 install --no-cache-dir --break-system-packages zensical

      - name: Build site
        run: zensical build

      - name: Push to pages branch
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          cd site
          git init -q -b pages
          git config user.email "pages-bot@codeberg.org"
          git config user.name "Pages Bot"
          git add .
          git commit -q -m "Deploy ${GITHUB_SHA}"
          git push -qf "https://pages-bot:${CODEBERG_TOKEN}@codeberg.org/${GITHUB_REPOSITORY}.git" pages
