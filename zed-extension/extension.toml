id = "kod"
name = "Kod"
version = "0.1.0"
schema_version = 1
authors = ["Filip Salo"]
description = "Kod language support — syntax highlighting via tree-sitter and diagnostics via the in-tree kod-lsp."
repository = "https://github.com/filipsalo/kodlang"

# Grammar lives in the sibling tree-sitter-kod/ directory, kept as its
# own git repo so Zed can clone it through a file:// URL during dev.
# The absolute path is machine-specific — adjust to your checkout
# location, or replace both lines with a published
# `repository = "https://github.com/..."` once the grammar lives in
# its own GitHub repo.
[grammars.kod]
repository = "file:///Users/filip/work/kodlang/tree-sitter-kod"
commit = "b25cd6d17d77d42109141187401c1d2256bd0f75"

# Language server. Zed launches whatever's at `binary.path` and pipes
# LSP over stdio. Users can override the path via Zed settings — see
# README — but the default points at the in-tree build output.
[language_servers.kod-lsp]
name = "Kod LSP"
language = "Kod"
[language_servers.kod-lsp.binary]
path = "build/apps/lsp/lsp"
