id = "kod"
name = "Kod"
version = "0.1.0"
schema_version = 1
authors = ["Filip Salo"]
description = "Kod language support — syntax highlighting via tree-sitter and diagnostics via the in-tree kod-lsp."
repository = "https://github.com/filipsalo/kodlang"

# Grammar is the sibling tree-sitter-kod/ in this repo. `path` is the
# local-dev escape hatch; for a published extension this becomes
# `repository = "..."` + `commit = "..."`.
[grammars.kod]
path = "../tree-sitter-kod"

# Language server. Zed launches whatever's at `binary.path` and pipes
# LSP over stdio. Users can override the path via Zed settings — see
# README — but the default points at the in-tree build output.
[language_servers.kod-lsp]
name = "Kod LSP"
language = "Kod"
[language_servers.kod-lsp.binary]
path = "build/apps/lsp/lsp"
